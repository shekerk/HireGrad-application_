spring.application.name=hiregradappli-backend
server.port=8082

# Load secrets from a gitignored .env (parsed as properties). Optional so a fresh
# clone still boots on the safe dev defaults below.
spring.config.import=optional:file:.env[.properties]

# ===== MySQL ===== (auto-creates the "hiregradappli" database if missing)
spring.datasource.url=jdbc:mysql://localhost:3306/hiregradappli?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Mail ===== (welcome / password-changed notifications; creds in .env)
# Defaults to Gmail SMTP. Leave MAIL_USERNAME blank in .env to disable email (sending is skipped).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:HireGrad <no-reply@hiregrad.local>}

# ===== JWT ===== (secret MUST be at least 32 characters for HS256)
# Real secret lives in .env (JWT_SECRET); the default here is dev-only.
app.jwt.secret=${JWT_SECRET:dev-secret-change-me-via-dotenv-0123456789}
app.jwt.expiration-ms=86400000

# ===== Seeded accounts =====
# Admin = developer-provided credentials (you hand these to the placement cell)
app.seed.admin.username=admin
app.seed.admin.password=admin123
app.seed.admin.full-name=Placement Cell
